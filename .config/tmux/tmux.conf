# ~/.config/tmux/tmux.conf
# Rose Pine (main) theme to match NeoVim + Ghostty. Transparent status bar,
# status line at the top. tmux 3.2+.

# ── True color passthrough ──────────────────────────────────────────────
# Without this, rose-pine renders wrong for nvim running *inside* tmux
# (nvim has termguicolors on). Advertise RGB for whatever $TERM Ghostty sets.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-overrides ",*:Tc"

# ── Rose Pine (main) palette ────────────────────────────────────────────
%hidden base="#191724"
%hidden surface="#1f1d2e"
%hidden overlay="#26233a"
%hidden muted="#6e6a86"
%hidden subtle="#908caa"
%hidden text="#e0def4"
%hidden love="#eb6f92"
%hidden gold="#f6c177"
%hidden rose="#ebbcba"
%hidden pine="#31748f"
%hidden foam="#9ccfd8"
%hidden iris="#c4a7e7"
%hidden hl_med="#403d52"

# ── Status bar: top, transparent ────────────────────────────────────────
# bg=default keeps the bar transparent so Ghostty's opacity/blur shows
# through, mirroring the transparent rose-pine setup in nvim.
set -g status-position top
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=$subtle"

# Left: session name in foam.
set -g status-left-length 40
set -g status-left " #[fg=$foam,bold]#S #[fg=$hl_med]│ "

# Right: date, then today's next / in-progress meeting (see next-meeting.sh).
# macOS already shows the wall clock in the menu bar, so there's no %H:%M here.
# The script prints its own "│ …" segment for the next / in-progress meeting,
# or a muted "│ no meetings" once the day's meetings are done.
set -g status-right-length 80
set -g status-right "#[fg=$subtle]%a %d %b #(/Users/tsharratt/.config/tmux/next-meeting.sh)"

# Windows: inactive muted, active in iris with a rose index.
# Leading glyphs flag state:
#   ◆ foam  = this worktree holds the local dev server (supercast.test)   [@staged]
#   ✻ iris  = Claude is working — animated pulse (claude-tmux-spinner)     [@claude]
#   ● love  = Claude is waiting on your input                             [@claude]
#   ● gold  = Claude finished its turn                                    [@claude]
# No glyph = idle. @staged is set by `wt dev`; @claude by the claude-tmux-signal
# hook. The ✻ frame lives in @claude_spin (animated by claude-tmux-spinner); if
# that daemon isn't running the format falls back to a static ✻.
set -g window-status-separator ""
set -g window-status-format         " #{?@staged,#[fg=$foam]◆ ,}#{?#{==:#{@claude},working},#[fg=$iris]#{?@claude_spin,#{@claude_spin},✻} ,}#{?#{==:#{@claude},waiting},#[fg=$love]● ,}#{?#{==:#{@claude},done},#[fg=$gold]● ,}#[fg=$muted]#I #[fg=$subtle]#W "
set -g window-status-current-format " #{?@staged,#[fg=$foam]◆ ,}#{?#{==:#{@claude},working},#[fg=$iris]#{?@claude_spin,#{@claude_spin},✻} ,}#{?#{==:#{@claude},waiting},#[fg=$love]● ,}#{?#{==:#{@claude},done},#[fg=$gold]● ,}#[fg=$rose,bold]#I #[fg=$iris,bold]#W "
set -g window-status-activity-style "fg=$gold"

# Clear the "done" dot as soon as you land on a window — you've seen it.
# But NOT the "waiting" dot: waiting means Claude needs your input, so glancing
# at the window doesn't resolve it — only actually replying does (UserPromptSubmit
# runs `claude-tmux-signal clear`). pane-focus-in fires whenever a pane becomes
# focused no matter HOW you got there — keyboard (select/next/previous-window),
# choose-tree, or a status-bar mouse click (which tmux runs as `switch-client`,
# NOT `select-window`, so an after-select-window hook would miss it). Requires
# `focus-events on`, set below.
set-hook -g pane-focus-in "if-shell -F '#{==:#{@claude},done}' 'set -w -u @claude'"

# Pane borders.
set -g pane-border-style "fg=$overlay"
set -g pane-active-border-style "fg=$iris"

# Messages / command prompt.
set -g message-style "bg=default,fg=$gold"
set -g message-command-style "bg=default,fg=$gold"

# Mode (copy/selection) highlight.
set -g mode-style "bg=$hl_med,fg=$text"

# Clock (prefix + t).
set -g clock-mode-colour "$iris"

# ── A few sensible defaults ─────────────────────────────────────────────
set -g base-index 1            # windows start at 1 (matches the left edge)
setw -g pane-base-index 1
set -g renumber-windows on     # keep window numbers gap-free after closing
set -g mouse on
set -sg escape-time 10         # snappier ESC in nvim
set -g focus-events on         # let nvim know when tmux pane gains/loses focus

# ── Worktree workflow (wt) ──────────────────────────────────────────────
# prefix+T  new task: prompt for a name → a window with a fresh worktree + Claude.
#           Type your prompt and pick auto/plan inside Claude as normal.
# Use %1, not %%: command-prompt only substitutes the *first* %%, which left the
# `wt spawn` argument literal and created a worktree/branch named "%%". %1 is
# substituted at every occurrence.
bind-key T command-prompt -p "task: " "new-window -c '#{pane_current_path}' -n '%1' '$HOME/.local/bin/wt spawn %1'"
# prefix+D  toggle the local dev server onto the current worktree (silent handoff).
#           Press again in the same window to hand it back to the canonical checkout.
bind-key D run-shell -b "$HOME/.local/bin/wt dev '#{pane_id}' '#{pane_current_path}'"
