# ~/.config/tmux/tmux.conf
# Rose Pine (main) theme to match NeoVim + Ghostty. Transparent status bar,
# status line at the top. tmux 3.2+.

# ── True color passthrough ──────────────────────────────────────────────
# Without this, rose-pine renders wrong for nvim running *inside* tmux
# (nvim has termguicolors on). Advertise RGB for whatever $TERM Ghostty sets.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-overrides ",*:Tc"

# ── Rose Pine (main) palette ────────────────────────────────────────────
%hidden base="#191724"
%hidden surface="#1f1d2e"
%hidden overlay="#26233a"
%hidden muted="#6e6a86"
%hidden subtle="#908caa"
%hidden text="#e0def4"
%hidden love="#eb6f92"
%hidden gold="#f6c177"
%hidden rose="#ebbcba"
%hidden pine="#31748f"
%hidden foam="#9ccfd8"
%hidden iris="#c4a7e7"
%hidden hl_med="#403d52"

# ── Status bar: top, transparent ────────────────────────────────────────
# bg=default keeps the bar transparent so Ghostty's opacity/blur shows
# through, mirroring the transparent rose-pine setup in nvim.
set -g status-position top
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=$subtle"

# Left: session name in foam.
set -g status-left-length 40
set -g status-left " #[fg=$foam,bold]#S #[fg=$hl_med]│ "

# Right: date, then today's next / in-progress meeting (see next-meeting.sh).
# macOS already shows the wall clock in the menu bar, so there's no %H:%M here.
# The script prints its own "│ …" segment for the next / in-progress meeting,
# or a muted "│ no meetings" once the day's meetings are done.
set -g status-right-length 80
set -g status-right "#[fg=$subtle]%a %d %b #(/Users/tsharratt/.config/tmux/next-meeting.sh)"

# Windows: inactive muted, active in iris with a rose index.
# Claude session status and the worktree dev-server flag now live in Herdr
# (the terminal workspace manager for agents), not tmux - see ~/.local/bin/wt.
set -g window-status-separator ""
set -g window-status-format         " #[fg=$muted]#I #[fg=$subtle]#W "
set -g window-status-current-format " #[fg=$rose,bold]#I #[fg=$iris,bold]#W "
set -g window-status-activity-style "fg=$gold"

# Pane borders.
set -g pane-border-style "fg=$overlay"
set -g pane-active-border-style "fg=$iris"

# Messages / command prompt.
set -g message-style "bg=default,fg=$gold"
set -g message-command-style "bg=default,fg=$gold"

# Mode (copy/selection) highlight.
set -g mode-style "bg=$hl_med,fg=$text"

# Clock (prefix + t).
set -g clock-mode-colour "$iris"

# ── A few sensible defaults ─────────────────────────────────────────────
set -g base-index 1            # windows start at 1 (matches the left edge)
setw -g pane-base-index 1
set -g renumber-windows on     # keep window numbers gap-free after closing
set -g mouse on
set -sg escape-time 10         # snappier ESC in nvim
set -g focus-events on         # let nvim know when tmux pane gains/loses focus

# Splits inherit the current pane's directory (default binds open in $HOME).
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# ── Worktree workflow ───────────────────────────────────────────────────
# The worktree + isolated dev-server workflow now runs inside Herdr, not tmux.
# `wt new <name>` (bound in ~/.config/herdr/config.toml) creates an isolated
# worktree - its own database, redis db, url and port - and starts Claude on it.
# See ~/.local/bin/wt and the per-project steps in ~/.config/wt/profiles/<repo>.sh.
